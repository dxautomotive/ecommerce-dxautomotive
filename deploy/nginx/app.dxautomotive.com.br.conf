# /etc/nginx/sites-available/app.dxautomotive.com.br
# Proxy reverso → Medusa (admin + API) na porta 127.0.0.1:9000
#
# Antes do certificado Let's Encrypt: só o bloco HTTP responde, deixando
# `/.well-known/acme-challenge/` aberto pra HTTP-01 challenge.
# Após `certbot --nginx`, o bloco HTTPS abaixo entra em vigor e o HTTP
# vira redirect.

server {
    listen 80;
    listen [::]:80;
    server_name app.dxautomotive.com.br;

    # Webroot do certbot (manter sempre, mesmo após HTTPS, pra renew)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Após emissão, descomentar o redirect:
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # Antes da emissão, proxy direto pro backend pra smoke test:
    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

