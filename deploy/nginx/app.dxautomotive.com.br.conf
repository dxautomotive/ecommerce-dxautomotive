# /etc/nginx/sites-available/app.dxautomotive.com.br
# Proxy reverso → Medusa (admin UI em /app + API REST em /admin /store /auth)
# na porta 127.0.0.1:9000.
#
# Estratégia de URL limpa (sem /app no path visível):
#  - /admin/*, /store/*, /auth/*, /health, /assets/*, /favicon.ico, /robots.txt
#    → proxy direto (rotas existentes do Medusa)
#  - / e qualquer outra rota → reescreve pra /app/$uri (admin UI)
#
# Resultado: usuário acessa app.dxautomotive.com.br/login mas o backend recebe
# /app/login (admin UI). API /admin/users/me continua chegando como /admin/users/me
# (não reescreve), retornando JSON normal.

# Bloco gerenciado pelo certbot — não editar `listen` ou os paths SSL aqui
# direto, usar `certbot --nginx` se precisar reemitir.

server {
    server_name app.dxautomotive.com.br;

    # Webroot do certbot pra renew automático
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Reviews podem subir fotos em base64 — middleware Medusa bumped pra 32MB
    client_max_body_size 32M;

    # ─── Rotas API REST + estáticos do admin: proxy direto ──────────
    location ~ ^/(admin|store|auth|health|assets|_next|favicon\.ico|robots\.txt|sitemap\.xml)(/|$) {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ─── Admin UI: reescreve / → /app, /login → /app/login etc ──────
    # Inclui a raiz vazia: navegador acessa /, recebe /app (que redireciona pra /app/login se sem sessão)
    location / {
        rewrite ^/(.*)$ /app/$1 break;
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/app.dxautomotive.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.dxautomotive.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name app.dxautomotive.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

